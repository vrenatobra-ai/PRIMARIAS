<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Resultados Electorales</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef2f6;
color:#222;
}

header{
background:#0054A6;
color:white;
padding:25px;
box-shadow:0 3px 8px rgba(0,0,0,.2);
}

header .inner{
max-width:1300px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:12px;
}

header .left h1{
font-size:34px;
}

header .left p{
margin-top:8px;
opacity:.9;
}

header .right{
text-align:right;
}

.header-small{
font-size:14px;
opacity:.95;
}

#porcentajeSuperior{
font-size:42px;
font-weight:bold;
}

.contenedor{
width:95%;
max-width:1300px;
margin:auto;
padding:20px;
}

.tarjetas{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.tarjeta{
background:white;
border-radius:10px;
padding:18px;
box-shadow:0 2px 8px rgba(0,0,0,.12);
}

.tarjeta h3{
font-size:15px;
color:#666;
}

.valor{
font-size:30px;
font-weight:bold;
margin-top:10px;
}

.panel{
background:white;
border-radius:10px;
padding:20px;
margin-top:20px;
box-shadow:0 2px 8px rgba(0,0,0,.12);
}

.panel h2{
margin-bottom:20px;
color:#0054A6;
}

.progreso{
background:#ddd;
height:24px;
border-radius:50px;
overflow:hidden;
margin-top:10px;
}

.progreso div{
height:24px;
background:#0054A6;
width:0%;
transition:1s;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0054A6;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

tbody tr:hover{
background:#f5f7fa;
}

.barra{
background:#ddd;
height:18px;
border-radius:20px;
overflow:hidden;
}

.relleno{
height:18px;
}

.ganador{
background:#edf8ee;
font-weight:bold;
}

footer{
text-align:center;
padding:25px;
color:#666;
}

@media(max-width:700px){
header .left h1{
font-size:26px;
}
.valor{
font-size:24px;
}
table{
font-size:14px;
}
}

</style>

</head>

<body>

<header>
  <div class="inner">
    <div class="left">
      <h1>RESULTADOS PRELIMINARES</h1>
      <p>Elección Primaria — Portal de Resultados</p>
    </div>

    <div class="right">
      <div class="header-small">Mesas escrutadas</div>
      <div id="porcentajeSuperior" aria-live="polite"></div>
    </div>
  </div>
</header>

<div class="contenedor">

  <div class="tarjetas">

    <div class="tarjeta">
      <h3>Participación</h3>
      <div class="valor" id="participacion"></div>
    </div>

    <div class="tarjeta">
      <h3>Electores</h3>
      <div class="valor" id="electores"></div>
    </div>

    <div class="tarjeta">
      <h3>Votantes</h3>
      <div class="valor" id="votantes"></div>
    </div>

    <div class="tarjeta">
      <h3>Mesas escrutadas</h3>
      <div class="valor" id="mesas"></div>
    </div>

  </div>

  <div class="panel">
    <h2>Avance del escrutinio</h2>
    <div class="progreso">
      <div id="barraMesas"></div>
    </div>
    <p id="textoMesas" style="margin-top:10px;"></p>
  </div>

  <div class="panel">
    <h2>Resultados por candidatura</h2>
    <table>
      <thead>
        <tr>
          <th>Candidato</th>
          <th>Pacto</th>
          <th>Votos</th>
          <th>%</th>
          <th>Resultado</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>

  <div class="panel">
    <h2>Otros votos</h2>
    <table>
      <tr>
        <td>Válidamente emitidos</td>
        <td id="validos"></td>
      </tr>
      <tr>
        <td>Nulos</td>
        <td id="nulos"></td>
      </tr>
      <tr>
        <td>Blancos</td>
        <td id="blancos"></td>
      </tr>
    </table>
  </div>

</div>

<footer>
  Actualización automática
</footer>
